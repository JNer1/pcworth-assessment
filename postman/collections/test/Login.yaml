$kind: http-request
name: Login
url: "{{base_url}}/login"
method: POST
headers:
  - name: Content-Type
    value: application/json
  - name: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "demo@example.com",
      "password": "password123"
    }
scripts:
  post-response: |-
    const res = pm.response.json();
    if (res.data && res.data.access_token) {
      pm.collectionVariables.set("token", res.data.access_token);
    }
